<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisionMeat – RPA/OCR 제어 패널</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥩</text></svg>">
  <style>
    /* ── 기본 리셋 & 테마 ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #242736;
      --border:   #2e3248;
      --text:     #e2e4f0;
      --text2:    #8b8fa8;
      --accent:   #4f8fff;
      --green:    #22c55e;
      --yellow:   #f59e0b;
      --red:      #ef4444;
      --orange:   #f97316;
    }

    body {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 헤더 ─────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      flex: 1;
      letter-spacing: 0.02em;
    }
    .header h1 span { color: var(--accent); }

    /* ── 동시접속 배너 ────────────────────────────────── */
    #busy-banner {
      display: none;
      background: linear-gradient(90deg, #1a2744, #1e1f35);
      border: 1px solid var(--accent);
      border-radius: 8px;
      margin: 12px 20px 0;
      padding: 12px 20px;
      display: none;
      align-items: center;
      gap: 14px;
    }
    #busy-banner.visible { display: flex; }
    .spinner-sm {
      width: 22px; height: 22px;
      border: 3px solid rgba(79,143,255,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    #busy-banner .busy-text { font-size: 0.9rem; color: var(--accent); }
    #busy-banner .busy-detail { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }

    /* ── 연결 상태 배지 ─────────────────────────────── */
    .conn-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .conn-badge.connected    { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid var(--green); }
    .conn-badge.disconnected { background: rgba(239,68,68,0.15);  color: var(--red);   border: 1px solid var(--red); }
    .conn-badge.connecting   { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid var(--yellow); }

    /* ── 레이아웃 ─────────────────────────────────────── */
    .main { padding: 20px; max-width: 1100px; margin: 0 auto; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 760px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ── 카드 ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
      margin-bottom: 14px;
    }

    /* ── 상태 카드 ─────────────────────────────────────── */
    .state-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .state-badge {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .state-badge.IDLE     { background: rgba(139,143,168,0.15); color: var(--text2); border: 1px solid var(--border); }
    .state-badge.RUNNING  { background: rgba(79,143,255,0.15);  color: var(--accent); border: 1px solid var(--accent); animation: pulse-border 2s infinite; }
    .state-badge.PAUSED   { background: rgba(245,158,11,0.15);  color: var(--yellow); border: 1px solid var(--yellow); }
    .state-badge.STOPPING { background: rgba(239,68,68,0.10);   color: var(--red);    border: 1px solid var(--red); }

    @keyframes pulse-border {
      0%, 100% { border-color: var(--accent); }
      50% { border-color: rgba(79,143,255,0.3); }
    }

    .info-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 6px 12px;
      font-size: 0.87rem;
    }
    .info-label { color: var(--text2); }
    .info-val   { color: var(--text); font-weight: 500; }

    /* ── 진행률 ──────────────────────────────────────── */
    .progress-group { margin-bottom: 14px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .progress-track {
      width: 100%;
      height: 8px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      border-radius: 4px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-fill.done { background: var(--green); }

    /* ── 현재 작업 요약 바 ────────────────────────────── */
    .now-doing {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 0.85rem;
      min-height: 42px;
    }
    .now-doing .nd-icon { font-size: 1.1rem; flex-shrink: 0; }
    .now-doing .nd-main { color: var(--text); font-weight: 600; flex: 1; }
    .now-doing .nd-sub  { color: var(--text2); font-size: 0.78rem; white-space: nowrap; }
    .nd-pill {
      display: inline-block;
      background: rgba(99,102,241,0.18);
      border-radius: 4px;
      padding: 1px 7px;
      margin: 0 3px;
      color: #a78bfa;
      font-weight: 700;
    }
    .nd-pill.green { background: rgba(34,197,94,0.15); color: #4ade80; }

    /* ── 게시판 선택 ────────────────────────────────────── */
    .board-select-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .board-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.83rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s;
    }
    .board-chip:has(input:checked) { border-color: var(--accent); background: rgba(99,102,241,0.1); }
    .board-chip input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

    .img-chip {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.35);
      border-radius: 4px;
      padding: 1px 6px;
      margin: 2px 4px 2px 0;
      font-size: 0.72rem;
      color: var(--text2);
    }

    /* ── 버튼 ─────────────────────────────────────────── */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.87rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-success  { background: var(--green);  color: #fff; }
    .btn-warning  { background: var(--yellow); color: #000; }
    .btn-danger   { background: var(--red);    color: #fff; }
    .btn-neutral  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-rpa      { background: #7c3aed; color: #fff; }
    .btn-ocr      { background: #0891b2; color: #fff; }

    /* ── 로그 콘솔 ───────────────────────────────────── */
    .log-console {
      background: #0d0f18;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      height: 300px;
      overflow-y: auto;
      font-family: "Consolas", "D2Coding", monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #a9b1d6;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line.error { color: #f7768e; }
    .log-line.warn  { color: #e0af68; }
    .log-line.ok    { color: #9ece6a; }

    /* ── 재개 현황 테이블 ─────────────────────────────── */
    .resume-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .resume-table th,
    .resume-table td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: center;
    }
    .resume-table th { background: var(--surface2); color: var(--text2); font-weight: 600; }
    .resume-table td:first-child { text-align: left; font-weight: 600; color: var(--text); }
    .done-rpa { color: var(--accent); }
    .done-ocr { color: var(--green);  }
    .not-done { color: var(--border); }

    .resume-table tr.has-incomplete { cursor: pointer; }
    .resume-table tr.has-incomplete:hover td { background: rgba(99,102,241,0.08); }
    .resume-table tr.selected td { background: rgba(99,102,241,0.18) !important; }
    .resume-table tr.has-incomplete td:first-child::after { content: " ▸"; color: var(--accent); font-size: 0.7rem; }
    .resume-table .all-done td:first-child { color: var(--text2); }

    .date-selected-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #fff;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      pointer-events: none;
    }
    .date-selected-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── 선택 모드 ───────────────────────────────────── */
    .mode-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 0.87rem;
      margin-bottom: 10px;
      width: 100%;
    }

    /* ── 날짜 직접 지정 ──────────────────────────────── */
    .date-toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text2);
      margin-bottom: 8px;
      cursor: pointer;
      user-select: none;
    }
    .date-toggle-row input[type=checkbox] { accent-color: var(--accent); width:15px; height:15px; cursor:pointer; }
    .date-toggle-row span { color: var(--text); font-weight: 500; }
    .date-range-box {
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .date-range-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .date-range-row label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 0.78rem;
      color: var(--text2);
      flex: 1;
    }
    .date-range-row input[type=date] {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 0.85rem;
      width: 100%;
    }
    .date-range-hint {
      font-size: 0.75rem;
      color: var(--text2);
      margin-top: 6px;
    }
    .date-range-hint .date-badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      color: #a78bfa;
      border-radius: 4px;
      padding: 0 6px;
      font-weight: 600;
    }

    /* ── 유틸 ────────────────────────────────────────── */
    .flex-row  { display: flex; align-items: center; gap: 10px; }
    .flex-end  { justify-content: flex-end; }
    .text-sm   { font-size: 0.8rem; }
    .text-muted { color: var(--text2); }
    .mt-8  { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mb-8  { margin-bottom: 8px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 구분선 ──────────────────────────────────────── */
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── 전체 오버레이 스피너 (연결 끊김 등) ──────────── */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,11,20,0.75);
      align-items: center;
      justify-content: center;
      z-index: 999;
      flex-direction: column;
      gap: 16px;
    }
    #overlay.show { display: flex; }
    .spinner-lg {
      width: 56px; height: 56px;
      border: 5px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
  </style>
</head>
<body>

<!-- ── 헤더 ───────────────────────────────────────────── -->
<div class="header">
  <h1>🥩 <span>VisionMeat</span> RPA/OCR 제어 패널</h1>
  <span id="conn-badge" class="conn-badge connecting">연결 중...</span>
</div>

<!-- ── 동시접속 배너 ──────────────────────────────────── -->
<div id="busy-banner">
  <div class="spinner-sm"></div>
  <div>
    <div class="busy-text">처리 중 – 이미 작업이 진행 중입니다</div>
    <div class="busy-detail" id="busy-detail">현재 단계: -</div>
  </div>
</div>

<!-- ── 메인 ───────────────────────────────────────────── -->
<div class="main">

  <!-- 상단 2열 그리드 -->
  <div class="grid-2">

    <!-- 왼쪽: 상태 + 진행률 -->
    <div class="card">
      <div class="card-title">현재 상태</div>

      <div class="state-row">
        <span id="state-badge" class="state-badge IDLE">대기중</span>
        <span id="job-mode-label" class="text-sm text-muted"></span>
      </div>

      <!-- 현재 작업 요약 (실행 중일 때만 표시) -->
      <div id="now-doing" class="now-doing" style="display:none">
        <span class="nd-icon" id="nd-icon">⏳</span>
        <span class="nd-main" id="nd-main">-</span>
        <span class="nd-sub"  id="nd-sub">-</span>
      </div>

      <div class="progress-group">
        <div class="progress-label">
          <span>전체 진행률</span>
          <span id="pct-label">0%</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <!-- 이미지별 진행 바 (OCR 중일 때 표시) -->
      <div id="img-progress-group" class="progress-group" style="display:none">
        <div class="progress-label">
          <span>이미지 진행 (<span id="f-board-inline">-</span>)</span>
          <span><span id="img-cur">0</span> / <span id="img-tot">0</span></span>
        </div>
        <div class="progress-track">
          <div id="img-progress-fill" class="progress-fill" style="background:linear-gradient(90deg,#22c55e,#4ade80)"></div>
        </div>
        <div id="img-active-list" style="margin-top:6px;font-size:0.75rem;color:var(--text2);line-height:1.8"></div>
      </div>

      <div class="info-grid">
        <span class="info-label">단계</span>
        <span class="info-val" id="f-phase">-</span>

        <span class="info-label">현재 날짜</span>
        <span class="info-val" id="f-date">-</span>

        <span class="info-label">날짜 진행</span>
        <span class="info-val" id="f-date-idx">-</span>

        <span class="info-label">현재 게시판</span>
        <span class="info-val" id="f-board">-</span>

        <span class="info-label">메시지</span>
        <span class="info-val" id="f-msg">-</span>
      </div>
    </div>

    <!-- 오른쪽: 제어 패널 -->
    <div class="card">
      <div class="card-title">작업 제어</div>

      <select id="mode-select" class="mode-select">
        <option value="full">전체 실행 (RPA 캡처 → OCR 분석)</option>
        <option value="rpa_only">RPA 캡처만</option>
        <option value="batch_only">OCR 분석만</option>
      </select>

      <!-- 날짜 직접 지정 -->
      <label class="date-toggle-row">
        <input type="checkbox" id="use-custom-dates" onchange="toggleDateRange()">
        <span>📅 날짜 직접 지정</span>
        <small style="color:var(--text2)">(기본: 누락 날짜 자동 감지)</small>
      </label>
      <div id="date-range-box" class="date-range-box" style="display:none">
        <div class="date-range-row">
          <label>
            시작일
            <input type="date" id="date-from">
          </label>
          <label>
            종료일
            <input type="date" id="date-to">
          </label>
        </div>
        <div class="date-range-hint" id="date-range-hint">날짜를 선택하세요</div>
      </div>

      <!-- 카카오 로그인 정보 -->
      <div style="display:flex;gap:10px;margin-bottom:8px">
        <label style="flex:1;font-size:0.85rem;color:var(--text)">
          카카오 이메일
          <input type="email" id="login-email" placeholder="example@email.com"
            style="width:100%;margin-top:4px;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.9rem">
        </label>
        <label style="flex:1;font-size:0.85rem;color:var(--text)">
          비밀번호
          <input type="password" id="login-pwd" placeholder="비밀번호"
            style="width:100%;margin-top:4px;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.9rem">
        </label>
      </div>

      <!-- 게시판 선택 -->
      <div class="board-select-row">
        <span style="font-size:0.85rem;color:var(--text);font-weight:500">게시판:</span>
        <label class="board-chip"><input type="checkbox" value="구매" checked> 구매</label>
        <label class="board-chip"><input type="checkbox" value="판매" checked> 판매</label>
        <label class="board-chip"><input type="checkbox" value="품목표" checked> 품목표</label>
        <label class="board-chip"><input type="checkbox" value="회원정보" checked> 회원정보</label>
        <label class="board-chip"><input type="checkbox" value="등업신청" checked> 등업신청</label>
      </div>

      <div class="btn-group">
        <button id="btn-run" class="btn btn-primary" onclick="startJob()">
          ▶ 실행 / 재시작
        </button>
        <button id="btn-rpa" class="btn btn-rpa" onclick="startJob('rpa_only')">
          📸 RPA만
        </button>
        <button id="btn-ocr" class="btn btn-ocr" onclick="startJob('batch_only')">
          🤖 OCR만
        </button>
      </div>

      <hr class="divider" />

      <div class="btn-group">
        <button id="btn-pause"  class="btn btn-warning" onclick="pauseJob()"  disabled>
          ⏸ 일시정지
        </button>
        <button id="btn-resume" class="btn btn-success" onclick="resumeJob()" disabled>
          ▶ 재개
        </button>
        <button id="btn-stop"   class="btn btn-danger"  onclick="stopJob()"   disabled>
          ⏹ 완전 중지
        </button>
      </div>

      <hr class="divider" />

      <div class="flex-row flex-end mt-8">
        <button class="btn btn-neutral text-sm" onclick="loadResumeState()">
          🔄 현황 새로고침
        </button>
      </div>
    </div>
  </div><!-- /grid-2 -->

  <!-- 스마트 재개 현황 -->
  <div class="card mt-16">
    <div class="flex-row mb-8">
      <div class="card-title" style="margin-bottom:0">스마트 재개 현황 (날짜별 완료 상태)</div>
    </div>
    <div id="resume-container" class="text-muted text-sm">로딩 중...</div>
  </div>

  <!-- 로그 콘솔 -->
  <div class="card mt-16">
    <div class="flex-row mb-8">
      <div class="card-title" style="margin-bottom:0">실시간 로그</div>
      <div style="flex:1"></div>
      <button class="btn btn-neutral text-sm" onclick="clearLog()">지우기</button>
    </div>
    <div id="log-console" class="log-console"></div>
  </div>

</div><!-- /main -->

<!-- ── 날짜 선택 토스트 ─────────────────────────────── -->
<div id="date-toast" class="date-selected-toast"></div>

<!-- ── 연결 끊김 오버레이 ──────────────────────────────── -->
<div id="overlay">
  <div class="spinner-lg"></div>
  <div style="color:#a9b1d6; font-size:0.95rem">서버 연결 중...</div>
</div>

<script>
/* =========================================================
   VisionMeat 제어 패널 – 클라이언트 스크립트
   SSE 기반 실시간 업데이트 + 버튼 제어
   ========================================================= */

let currentState = "IDLE";
let evtSource = null;
let reconnectTimer = null;

// ── SSE 연결 ──────────────────────────────────────────────
function connectSSE() {
  if (evtSource) { evtSource.close(); }

  const badge = document.getElementById("conn-badge");
  badge.textContent = "연결 중...";
  badge.className = "conn-badge connecting";

  evtSource = new EventSource("/api/stream");

  evtSource.onopen = () => {
    badge.textContent = "연결됨";
    badge.className = "conn-badge connected";
    document.getElementById("overlay").classList.remove("show");
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  evtSource.onerror = () => {
    badge.textContent = "연결 끊김";
    badge.className = "conn-badge disconnected";
    document.getElementById("overlay").classList.add("show");
    // EventSource가 자동 재연결하지만, 추가로 5초 후 강제 재연결
    if (!reconnectTimer) {
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connectSSE();
      }, 5000);
    }
  };

  evtSource.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleEvent(data);
    } catch (err) {
      console.warn("SSE parse error:", err);
    }
  };
}

// ── 이벤트 핸들러 ──────────────────────────────────────────
function handleEvent(data) {
  switch (data.type) {
    case "snapshot":
      // 접속 시 전체 상태 수신
      applyState(data.state, data.job_mode);
      applyProgress(data.progress);
      if (data.logs) data.logs.forEach(appendLog);
      break;

    case "state":
      applyState(data.state, data.job_mode);
      break;

    case "progress":
      applyProgress(data.progress);
      break;

    case "log":
      appendLog(data.line);
      break;
  }
}

// ── 상태 적용 ────────────────────────────────────────────
function applyState(state, mode) {
  currentState = state;

  // 배지
  const badge = document.getElementById("state-badge");
  const labels = { IDLE: "대기중", RUNNING: "실행 중", PAUSED: "일시정지", STOPPING: "중단 중" };
  badge.textContent = labels[state] || state;
  badge.className = `state-badge ${state}`;

  // 모드 레이블
  const modeLabels = { full: "전체 실행", rpa_only: "RPA 캡처", batch_only: "OCR 분석" };
  const modeEl = document.getElementById("job-mode-label");
  modeEl.textContent = mode ? `(${modeLabels[mode] || mode})` : "";

  // 버튼 활성화
  updateButtons(state);

  // 동시접속 배너: 내가 시작한 작업이면 숨김, 남이 시작한 작업이면 표시
  const banner = document.getElementById("busy-banner");
  const iStartedJob = sessionStorage.getItem("I_STARTED_JOB") === "true";
  if ((state === "RUNNING" || state === "PAUSED") && !iStartedJob) {
    banner.classList.add("visible");
  } else {
    banner.classList.remove("visible");
  }
  // 작업 완료 시 플래그 초기화 + 현황 테이블 자동 새로고침
  if (state === "IDLE") {
    sessionStorage.removeItem("I_STARTED_JOB");
    loadResumeState();
  }
}

function pill(text, cls="") {
  return `<span class="nd-pill ${cls}">${text}</span>`;
}

function applyProgress(p) {
  if (!p) return;

  // 진행률 바
  const pct = Math.max(0, Math.min(100, p.pct || 0));
  const fill = document.getElementById("progress-fill");
  fill.style.width = pct + "%";
  fill.className = "progress-fill" + (pct >= 100 ? " done" : "");
  document.getElementById("pct-label").textContent = pct.toFixed(1) + "%";

  // 필드
  document.getElementById("f-phase").textContent = phaseLabel(p.phase);
  document.getElementById("f-date").textContent  = p.current_date || "-";
  document.getElementById("f-board").textContent = p.current_board || "-";
  document.getElementById("f-msg").textContent   = p.message || "-";

  const dateIdxEl = document.getElementById("f-date-idx");
  if (p.total_dates > 0) {
    dateIdxEl.textContent = `${p.current_date_index} / ${p.total_dates}`;
  } else {
    dateIdxEl.textContent = "-";
  }

  // ── 현재 작업 요약 바 ──────────────────────────────
  const ndBox  = document.getElementById("now-doing");
  const ndIcon = document.getElementById("nd-icon");
  const ndMain = document.getElementById("nd-main");
  const ndSub  = document.getElementById("nd-sub");

  if (p.phase === "capturing") {
    ndBox.style.display = "";
    ndIcon.textContent = "📸";
    const dateStr = p.total_dates > 0
      ? `날짜 ${pill(p.current_date_index + "/" + p.total_dates)} `
      : (p.current_date ? `${p.current_date} ` : "");
    const boardStr = p.current_board
      ? `${p.current_board} 게시판 ${p.total_in_scope > 0 ? pill(p.current_index + "/" + p.total_in_scope) : ""} 수집 중`
      : "게시판 준비 중";
    ndMain.innerHTML = `RPA 캡처  ${dateStr}${boardStr}`;
    ndSub.textContent = p.current_date || "";

  } else if (p.phase === "ocr") {
    ndBox.style.display = "";
    ndIcon.textContent = "🔍";
    const dateStr = p.total_dates > 0
      ? `날짜 ${pill(p.current_date_index + "/" + p.total_dates)} `
      : (p.current_date ? `${p.current_date} ` : "");
    const boardStr = p.current_board ? `${p.current_board} ` : "";
    const imgStr   = (p.img_total > 0)
      ? `이미지 ${pill(p.img_current + "/" + p.img_total, "green")}`
      : "";
    ndMain.innerHTML = `OCR 분석  ${dateStr}${boardStr}${imgStr}`;
    ndSub.textContent = p.current_date || "";

  } else {
    ndBox.style.display = "none";
  }

  // 이미지별 진행 상황
  const imgGroup = document.getElementById("img-progress-group");
  const imgTotal = p.img_total || 0;
  const imgCur   = p.img_current || 0;
  if (p.phase === "ocr" && imgTotal > 0) {
    imgGroup.style.display = "";
    document.getElementById("img-cur").textContent = imgCur;
    document.getElementById("img-tot").textContent = imgTotal;
    document.getElementById("f-board-inline").textContent = p.current_board || "-";
    const imgPct = Math.min(100, imgTotal > 0 ? (imgCur / imgTotal * 100) : 0);
    document.getElementById("img-progress-fill").style.width = imgPct + "%";
    const activeList = document.getElementById("img-active-list");
    const active = p.img_active || [];
    if (active.length > 0) {
      activeList.innerHTML = active.map(fn =>
        `<span class="img-chip">⏳ ${fn}</span>`
      ).join("");
    } else {
      activeList.innerHTML = "";
    }
  } else {
    imgGroup.style.display = "none";
  }

  // 동시접속 배너 상세 업데이트
  document.getElementById("busy-detail").textContent =
    `단계: ${phaseLabel(p.phase)}` + (p.current_date ? ` | 날짜: ${p.current_date}` : "")
    + (p.current_board ? ` | 게시판: ${p.current_board}` : "");
}

function phaseLabel(phase) {
  const map = {
    idle: "대기중", capturing: "RPA 캡처 중", ocr: "OCR 분석 중",
    finished: "완료", error: "오류"
  };
  return map[phase] || phase || "-";
}

// ── 버튼 상태 제어 ──────────────────────────────────────
function updateButtons(state) {
  const busy = state === "RUNNING" || state === "PAUSED" || state === "STOPPING";

  document.getElementById("btn-run").disabled    = busy;
  document.getElementById("btn-rpa").disabled    = busy;
  document.getElementById("btn-ocr").disabled    = busy;
  document.getElementById("btn-pause").disabled  = state !== "RUNNING";
  document.getElementById("btn-resume").disabled = state !== "PAUSED";
  document.getElementById("btn-stop").disabled   = !busy || state === "STOPPING";
}

// ── 로그 콘솔 ─────────────────────────────────────────
const MAX_LOG_LINES = 400;
let logLines = [];

function appendLog(line) {
  logLines.push(line);
  if (logLines.length > MAX_LOG_LINES) logLines = logLines.slice(-MAX_LOG_LINES);

  const el = document.getElementById("log-console");
  // 색상 구분
  const div = document.createElement("div");
  div.className = "log-line" +
    (line.includes("❌") || line.includes("오류") ? " error" :
     line.includes("⚠") || line.includes("경고") ? " warn" :
     line.includes("✅") || line.includes("완료") ? " ok" : "");
  div.textContent = line;
  el.appendChild(div);

  // 최대 줄 수 유지
  while (el.children.length > MAX_LOG_LINES) el.removeChild(el.firstChild);

  // 자동 스크롤 (맨 아래에 있을 때만)
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
  if (atBottom) el.scrollTop = el.scrollHeight;
}

function clearLog() {
  logLines = [];
  document.getElementById("log-console").innerHTML = "";
}

// ── API 호출 헬퍼 ──────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(path, opts);
  if (!resp.ok) {
    const txt = await resp.text().catch(() => resp.statusText);
    throw new Error(txt || resp.statusText);
  }
  if (resp.status === 204) return null;
  return resp.json();
}

// ── 제어 버튼 핸들러 ────────────────────────────────────
function toggleDateRange() {
  const checked = document.getElementById("use-custom-dates").checked;
  document.getElementById("date-range-box").style.display = checked ? "" : "none";
  if (checked) updateDateHint();
}

function updateDateHint() {
  const from = document.getElementById("date-from").value;
  const to   = document.getElementById("date-to").value;
  const hint = document.getElementById("date-range-hint");
  if (!from || !to) { hint.textContent = "날짜를 선택하세요"; return; }
  const d0 = new Date(from), d1 = new Date(to);
  if (d0 > d1) { hint.innerHTML = '<span style="color:#f87171">⚠ 시작일이 종료일보다 늦습니다</span>'; return; }
  const days = Math.round((d1 - d0) / 86400000) + 1;
  hint.innerHTML = `<span class="date-badge">${days}일</span> 범위: ${from} ~ ${to}`;
}

// 날짜 input에 오늘 기본값 설정
(function initDateInputs() {
  const today = new Date().toISOString().slice(0, 10);
  const week  = new Date(Date.now() - 6 * 86400000).toISOString().slice(0, 10);
  document.getElementById("date-from").value = week;
  document.getElementById("date-to").value   = today;
  document.getElementById("date-from").addEventListener("change", updateDateHint);
  document.getElementById("date-to").addEventListener("change", updateDateHint);
})();

async function startJob(modeOverride) {
  const mode = modeOverride || document.getElementById("mode-select").value;
  const useCustom = document.getElementById("use-custom-dates").checked;

  const body = { mode };
  if (useCustom) {
    const date_from = document.getElementById("date-from").value;
    const date_to   = document.getElementById("date-to").value;
    if (!date_from || !date_to) { alert("시작일과 종료일을 모두 입력하세요."); return; }
    if (date_from > date_to) { alert("시작일이 종료일보다 늦습니다."); return; }
    body.date_from = date_from;
    body.date_to   = date_to;
  }

  // 카카오 로그인 정보
  const loginEmail = document.getElementById("login-email").value.trim();
  const loginPwd   = document.getElementById("login-pwd").value;
  if (!loginEmail || !loginPwd) { alert("카카오 이메일과 비밀번호를 입력하세요."); return; }
  body.login_email = loginEmail;
  body.login_pwd   = loginPwd;

  // 게시판 선택
  const boards = [...document.querySelectorAll(".board-chip input:checked")].map(c => c.value);
  if (boards.length === 0) { alert("게시판을 하나 이상 선택하세요."); return; }
  if (boards.length < 5) body.boards = boards;  // 5개 전부 선택 시 전체(기본)

  try {
    await api("POST", "/api/run", body);
    sessionStorage.setItem("I_STARTED_JOB", "true");
  } catch (e) {
    alert("실행 오류: " + e.message);
  }
}

async function pauseJob() {
  try { await api("POST", "/api/pause"); }
  catch (e) { alert("일시정지 오류: " + e.message); }
}

async function resumeJob() {
  try { await api("POST", "/api/resume"); }
  catch (e) { alert("재개 오류: " + e.message); }
}

async function stopJob() {
  if (!confirm("정말 작업을 중지하시겠습니까?\n진행 중인 단계가 완료된 후 중단됩니다.")) return;
  try { await api("POST", "/api/stop"); }
  catch (e) { alert("중지 오류: " + e.message); }
}

// ── 스마트 재개 현황 테이블 ────────────────────────────
async function loadResumeState() {
  const container = document.getElementById("resume-container");
  container.innerHTML = '<span class="text-muted">불러오는 중...</span>';
  try {
    const data = await api("GET", "/api/resume_state");
    const entries = Object.entries(data).sort();
    if (!entries.length) {
      container.innerHTML = '<span class="text-muted">처리된 데이터 폴더가 없습니다.</span>';
      return;
    }

    let html = `<table class="resume-table">
      <thead><tr>
        <th>날짜</th>
        <th>구매<br><small>캡처/OCR</small></th>
        <th>판매<br><small>캡처/OCR</small></th>
        <th>품목표<br><small>캡처/OCR</small></th>
        <th>회원정보<br><small>캡처/OCR</small></th>
        <th>등업신청<br><small>캡처/OCR</small></th>
        <th style="width:60px"></th>
      </tr></thead><tbody>`;

    for (const [date, boards] of entries) {
      let hasRpa = true, hasOcr = true;
      const incompleteBoards = [];
      for (const board of ["구매", "판매", "품목표", "회원정보", "등업신청"]) {
        const info = boards[board] || {};
        if (!info.rpa_done) hasRpa = false;
        if (!info.ocr_done) hasOcr = false;
        if (!info.rpa_done || !info.ocr_done) incompleteBoards.push(board);
      }
      const allDone = hasRpa && hasOcr;
      const needsRpa = !hasRpa;
      const needsOcr = !hasOcr;
      const rowClass = allDone ? "all-done" : "has-incomplete";
      const boardsJson = JSON.stringify(incompleteBoards).replace(/"/g, '&quot;');
      const clickAttr = allDone ? "" : `onclick="selectDateFromTable('${date}', ${needsRpa}, ${needsOcr}, ${boardsJson})"`;

      html += `<tr class="${rowClass}" ${clickAttr}>`;
      html += `<td>${date}</td>`;
      for (const board of ["구매", "판매", "품목표", "회원정보", "등업신청"]) {
        const info = boards[board] || {};
        const rpa = info.rpa_done
          ? '<span class="done-rpa">✓ 캡처</span>'
          : '<span class="not-done">○ 미완</span>';
        const ocr = info.ocr_done
          ? '<span class="done-ocr">✓ OCR</span>'
          : '<span class="not-done">○ 미완</span>';
        html += `<td>${rpa} / ${ocr}</td>`;
      }
      if (allDone) {
        html += `<td><span class="done-ocr" style="font-size:0.75rem">완료</span></td>`;
      } else {
        html += `<td><span style="color:var(--accent);font-size:0.75rem;font-weight:600">선택 ▸</span></td>`;
      }
      html += "</tr>";
    }
    html += "</tbody></table>";
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<span class="text-muted">로드 실패: ${e.message}</span>`;
  }
}

// ── 테이블에서 날짜 클릭 → 자동 세팅 ─────────────────
function selectDateFromTable(date, needsRpa, needsOcr, incompleteBoards) {
  // 1) 날짜 직접 지정 ON
  const chk = document.getElementById("use-custom-dates");
  chk.checked = true;
  toggleDateRange();

  // 2) 시작일/종료일 세팅
  document.getElementById("date-from").value = date;
  document.getElementById("date-to").value   = date;
  updateDateHint();

  // 3) 적절한 모드 자동 선택
  const modeSelect = document.getElementById("mode-select");
  if (needsRpa && needsOcr) {
    modeSelect.value = "full";
  } else if (needsRpa) {
    modeSelect.value = "rpa_only";
  } else if (needsOcr) {
    modeSelect.value = "batch_only";
  }

  // 4) 미완료 게시판만 체크
  if (incompleteBoards && incompleteBoards.length > 0) {
    document.querySelectorAll(".board-chip input").forEach(cb => {
      cb.checked = incompleteBoards.includes(cb.value);
    });
  }

  // 5) 테이블 행 하이라이트
  document.querySelectorAll(".resume-table tr.selected").forEach(r => r.classList.remove("selected"));
  event.currentTarget.classList.add("selected");

  // 6) 토스트 + 제어 패널 영역으로 스크롤
  const modeLabel = { full: "전체 실행", rpa_only: "RPA 캡처만", batch_only: "OCR 분석만" };
  const boardNames = incompleteBoards ? incompleteBoards.join(", ") : "전체";
  showToast(`${date} 선택됨 → ${modeLabel[modeSelect.value]} [${boardNames}]`);
  document.getElementById("mode-select").scrollIntoView({ behavior: "smooth", block: "center" });
}

function showToast(msg) {
  const t = document.getElementById("date-toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 2500);
}

// ── 초기화 ────────────────────────────────────────────
connectSSE();
loadResumeState();
</script>
</body>
</html>
